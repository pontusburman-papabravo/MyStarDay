<!DOCTYPE html>
<html lang="sv">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Barnets inloggning - Min Stjärndag</title>

  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;700&family=Plus+Jakarta+Sans:wght@400;500;600&display=swap" rel="stylesheet">

  <!-- Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            gold: '#F5A623',
            'gold-light': '#FFF3D6',
            navy: '#1B2340',
            'navy-soft': '#2A3458',
            sky: '#E8F0FE',
            lavender: '#EDE7F6',
            mint: '#E0F5EC',
            coral: '#FDEAE7',
            'text-soft': '#5A6178',
          },
          fontFamily: {
            heading: ['Outfit', 'sans-serif'],
            body: ['Plus Jakarta Sans', 'sans-serif'],
          },
        },
      },
    }
  </script>

  <link rel="stylesheet" href="/css/theme.css">
  <script src="/js/theme.js"></script>

  <style>
    body { background-color: #FAFBFF; }
    .dark body { background-color: #0F1629; }
    .star-animation { animation: twinkle 2s ease-in-out infinite; }
    @keyframes twinkle { 0%, 100% { opacity: 1; } 50% { opacity: 0.5; } }
    .pulse-glow { animation: pulse 2s cubic-bezier(0.4, 0, 0.6, 1) infinite; }
    @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.8; } }
  </style>
</head>
<body class="font-body">
  <!-- Star Logo Home Link -->
  <a href="/" class="fixed top-6 left-6 z-10 hover:scale-110 transition-transform duration-200">
    <span class="text-4xl star-animation">⭐</span>
  </a>

  <!-- Background decorative stars -->
  <div class="fixed inset-0 pointer-events-none overflow-hidden">
    <div class="absolute top-10 right-12 text-3xl star-animation" style="animation-delay: 0.3s">✨</div>
    <div class="absolute top-1/3 left-8 text-2xl star-animation" style="animation-delay: 0.6s">⭐</div>
    <div class="absolute bottom-20 right-1/4 text-3xl star-animation" style="animation-delay: 0.9s">✨</div>
    <div class="absolute top-2/3 left-1/4 text-2xl star-animation" style="animation-delay: 1.2s">⭐</div>
  </div>

  <div class="min-h-screen flex items-center justify-center px-4 py-8">
    <div class="w-full max-w-md">
      <!-- Welcome Section -->
      <div class="text-center mb-12">
        <div class="mb-6 flex justify-center">
          <span class="text-8xl pulse-glow">🌟</span>
        </div>
        <h1 class="font-heading text-4xl md:text-5xl font-bold text-navy mb-3">
          Hej, Stjärnutforskare!
        </h1>
        <p class="text-lg md:text-xl text-text-soft">
          Skriv ditt namn och din PIN-kod för att börja ✨
        </p>
      </div>

      <!-- Error Message -->
      <div id="errorAlert" class="hidden mb-6 p-4 bg-coral rounded-lg border-2 border-red-300">
        <div class="flex items-start gap-3">
          <span class="text-2xl">⚠️</span>
          <div>
            <p class="font-heading font-semibold text-navy" id="errorMessage"></p>
            <p id="lockoutMessage" class="text-sm text-text-soft mt-1 hidden">
              Kontot är tillfälligt låst. Försök igen om en stund.
            </p>
          </div>
        </div>
      </div>

      <!-- Loading Spinner -->
      <div id="loadingSpinner" class="hidden mb-6 flex justify-center">
        <div class="w-12 h-12 border-4 border-gold-light border-t-gold rounded-full animate-spin"></div>
      </div>

      <!-- Success Message -->
      <div id="successAlert" class="hidden mb-6 p-4 bg-mint rounded-lg border-2 border-teal-300">
        <div class="flex items-center gap-3">
          <span class="text-2xl">✅</span>
          <p class="font-heading font-semibold text-navy">Välkommen! 🚀</p>
        </div>
      </div>

      <!-- Login Form -->
      <form id="childLoginForm" class="bg-white rounded-2xl shadow-lg p-8 md:p-10 space-y-6 border-2 border-sky">
        <!-- Name Field -->
        <div>
          <label for="username" class="block font-heading font-semibold text-navy text-lg mb-3">
            Ditt namn 👤
          </label>
          <input
            id="username"
            type="text"
            placeholder="Skriv ditt förnamn"
            required
            class="w-full px-4 py-3 text-lg rounded-lg border-2 border-sky focus:border-gold focus:outline-none transition-colors duration-200 bg-sky/30 placeholder-text-soft"
          >
          <p class="text-xs text-text-soft mt-2">T.ex. "Dea" eller "Emil"</p>
        </div>

        <!-- PIN Field -->
        <div>
          <label for="pin" class="block font-heading font-semibold text-navy text-lg mb-3">
            Din hemliga PIN 🔐
          </label>
          <input
            id="pin"
            type="tel"
            inputmode="numeric"
            pattern="[0-9]*"
            maxlength="4"
            placeholder="0000"
            required
            class="w-full px-4 py-3 text-2xl text-center rounded-lg border-2 border-sky focus:border-gold focus:outline-none transition-colors duration-200 bg-sky/30 placeholder-text-soft tracking-widest font-heading font-bold"
          >
          <p class="text-xs text-text-soft mt-2">Bara 4 siffror</p>
        </div>

        <!-- Submit Button -->
        <button
          type="submit"
          id="submitBtn"
          class="w-full bg-gradient-to-r from-gold to-yellow-400 hover:from-gold/90 hover:to-yellow-400/90 text-navy font-heading font-bold text-xl py-4 px-6 rounded-lg transition-all duration-200 shadow-md hover:shadow-lg active:scale-95 disabled:opacity-50 disabled:cursor-not-allowed flex items-center justify-center gap-2"
        >
          <span>Kör!</span>
          <span class="text-2xl">🚀</span>
        </button>
      </form>

      <!-- Divider -->
      <div class="my-8 flex items-center gap-4">
        <div class="flex-1 h-px bg-sky"></div>
        <span class="text-text-soft text-sm">eller</span>
        <div class="flex-1 h-px bg-sky"></div>
      </div>

      <!-- Parent Login Link -->
      <div class="text-center">
        <p class="text-text-soft mb-3">Är du förälder?</p>
        <a
          href="/login"
          class="inline-block px-6 py-2 border-2 border-navy text-navy font-heading font-semibold rounded-lg hover:bg-navy hover:text-white transition-colors duration-200"
        >
          Föräldra-inloggning 👨‍👩‍👧‍👦
        </a>
      </div>

      <!-- Fun Footer -->
      <div class="mt-12 text-center">
        <p class="text-sm text-text-soft flex items-center justify-center gap-2">
          <span>Lycka till! Må dina stjärnor lysa starkt</span>
          <span class="text-xl">⭐</span>
        </p>
      </div>
    </div>
  </div>

  <script src="/js/auth.js"></script>

  <script>
    const form = document.getElementById('childLoginForm');
    const usernameInput = document.getElementById('username');
    const pinInput = document.getElementById('pin');
    const submitBtn = document.getElementById('submitBtn');

    function showLoginError(message) {
      const errorAlert = document.getElementById('errorAlert');
      document.getElementById('errorMessage').textContent = message;
      errorAlert.classList.remove('hidden');
    }

    function hideLoginError() {
      document.getElementById('errorAlert').classList.add('hidden');
      document.getElementById('lockoutMessage').classList.add('hidden');
    }

    function setLoginLoading(loading) {
      if (loading) {
        submitBtn.disabled = true;
        document.getElementById('loadingSpinner').classList.remove('hidden');
      } else {
        submitBtn.disabled = false;
        document.getElementById('loadingSpinner').classList.add('hidden');
      }
    }

    form.addEventListener('submit', async (e) => {
      e.preventDefault();

      const username = usernameInput.value.trim();
      const pin = pinInput.value.trim();

      if (!username || !pin) {
        showLoginError('Ange både namn och PIN!');
        return;
      }

      if (pin.length !== 4 || !/^\d+$/.test(pin)) {
        showLoginError('PIN-koden måste vara exakt 4 siffror!');
        return;
      }

      setLoginLoading(true);
      hideLoginError();

      try {
        // Auth.api() returns parsed JSON directly and throws on error
        const data = await Auth.api('/api/auth/child-login', {
          method: 'POST',
          body: JSON.stringify({ username, pin }),
        });

        // Store auth token and user
        Auth.setAuth(data.token, data.user);

        // Show success message
        document.getElementById('successAlert').classList.remove('hidden');
        form.classList.add('hidden');

        // Redirect after a short delay
        setTimeout(() => {
          window.location.href = '/child-dashboard';
        }, 1500);
      } catch (error) {
        setLoginLoading(false);

        // Check if it's a lockout error
        if (error.message && error.message.includes('låst')) {
          showLoginError(error.message);
          document.getElementById('lockoutMessage').classList.remove('hidden');
        } else {
          showLoginError(error.message || 'Något gick fel. Försök igen.');
        }
        console.error('Inloggningsfel:', error);
      }
    });

    // PIN input: numeric only
    pinInput.addEventListener('input', (e) => {
      e.target.value = e.target.value.replace(/[^0-9]/g, '');
    });

    // Keyboard navigation
    usernameInput.addEventListener('keydown', (e) => {
      if (e.key === 'Enter') { pinInput.focus(); }
    });

    pinInput.addEventListener('keydown', (e) => {
      if (e.key === 'Enter') { form.dispatchEvent(new Event('submit')); }
    });
  </script>
</body>
</html>
