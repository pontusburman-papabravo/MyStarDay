<!DOCTYPE html>
<html lang="sv">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Återställ lösenord - Min Stjärndag</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@600;700;800&family=Plus+Jakarta+Sans:wght@400;500;600&display=swap" rel="stylesheet">
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            gold: '#F5A623',
            'gold-light': '#FFF3D6',
            navy: '#1B2340',
            'navy-soft': '#2A3458',
            sky: '#E8F0FE',
            lavender: '#EDE7F6',
            mint: '#E0F5EC',
            coral: '#FDEAE7',
            'text-soft': '#5A6178',
          },
          fontFamily: {
            heading: ['Outfit', 'sans-serif'],
            body: ['Plus Jakarta Sans', 'sans-serif'],
          },
        },
      },
    }
  </script>
  <script src="/js/auth.js"></script>
  <script src="/js/i18n.js"></script>
</head>
<body class="bg-white font-body text-navy">
  <div class="min-h-screen flex items-center justify-center px-4 py-8">
    <div class="w-full max-w-md">
      <!-- Header -->
      <div class="text-center mb-8">
        <div class="text-4xl mb-3">⭐</div>
        <h1 class="text-3xl font-heading font-bold text-navy mb-2">Min Stjärndag</h1>
        <p class="text-text-soft">Återställ ditt lösenord</p>
      </div>

      <!-- Form Card -->
      <div class="bg-sky rounded-2xl p-8 shadow-sm">
        <form id="resetForm" class="space-y-6">
          <!-- New Password Field -->
          <div>
            <label for="password" class="block text-sm font-semibold text-navy mb-2">
              Nytt lösenord
            </label>
            <input
              type="password"
              id="password"
              name="password"
              placeholder="Minst 8 tecken"
              required
              minlength="8"
              class="w-full px-4 py-3 rounded-lg border-2 border-lavender focus:border-gold focus:outline-none bg-white text-navy placeholder-text-soft transition-colors"
            />
            <p class="text-xs text-text-soft mt-1">Måste vara minst 8 tecken långt</p>
          </div>

          <!-- Confirm Password Field -->
          <div>
            <label for="confirmPassword" class="block text-sm font-semibold text-navy mb-2">
              Bekräfta lösenord
            </label>
            <input
              type="password"
              id="confirmPassword"
              name="confirmPassword"
              placeholder="Upprepa lösenord"
              required
              class="w-full px-4 py-3 rounded-lg border-2 border-lavender focus:border-gold focus:outline-none bg-white text-navy placeholder-text-soft transition-colors"
            />
          </div>

          <!-- Error Message -->
          <div id="resetError" class="hidden bg-coral border-l-4 border-red-500 p-4 rounded">
            <p id="resetErrorText" class="text-sm text-navy"></p>
          </div>

          <!-- Success Message -->
          <div id="resetSuccess" class="hidden bg-mint border-l-4 border-green-500 p-4 rounded">
            <p class="text-sm text-navy">Lösenordet har återställts! Du omdirigeras till inloggning...</p>
          </div>

          <!-- Submit Button -->
          <button
            type="submit"
            id="submitBtn"
            class="w-full bg-gold hover:bg-yellow-500 text-white font-semibold py-3 rounded-lg transition-colors duration-200"
          >
            Återställ lösenord
          </button>
        </form>

        <!-- Back to Login Link -->
        <div class="text-center mt-6">
          <p class="text-text-soft text-sm">
            Minns du ditt lösenord?
            <a href="/login" class="text-gold font-semibold hover:underline">Gå till inloggning</a>
          </p>
        </div>
      </div>
    </div>
  </div>

  <script>
    document.addEventListener('DOMContentLoaded', async () => {
      const urlParams = new URLSearchParams(window.location.search);
      const token = urlParams.get('token');

      if (!token) {
        showError('resetError', 'Ogiltig återställningslänk');
        return;
      }

      const form = document.getElementById('resetForm');
      const submitBtn = document.getElementById('submitBtn');

      form.addEventListener('submit', async (e) => {
        e.preventDefault();

        const password = document.getElementById('password').value;
        const confirmPassword = document.getElementById('confirmPassword').value;

        // Client-side validation
        if (password.length < 8) {
          showError('resetError', 'Lösenordet måste vara minst 8 tecken långt');
          return;
        }

        if (password !== confirmPassword) {
          showError('resetError', 'Lösenorden matchar inte');
          return;
        }

        hideError('resetError');
        setLoading(submitBtn, true);

        try {
          const response = await fetch('/api/auth/reset-password', {
            method: 'POST',
            headers: {
              'Content-Type': 'application/json',
            },
            body: JSON.stringify({
              token,
              password,
            }),
          });

          const data = await response.json();

          if (!response.ok) {
            throw new Error(data.error || data.message || 'Lösenordet kunde inte återställas');
          }

          document.getElementById('resetSuccess').classList.remove('hidden');
          form.classList.add('hidden');

          setTimeout(() => {
            window.location.href = '/login';
          }, 2000);
        } catch (error) {
          showError('resetError', error.message);
        } finally {
          setLoading(submitBtn, false);
        }
      });
    });
  </script>
</body>
</html>
